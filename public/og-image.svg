<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#1a1205"/>
      <stop offset="0.6" stop-color="#050505"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE29A"/>
      <stop offset="0.45" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8D7220"/>
    </linearGradient>
    <linearGradient id="plat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#E5E4E2"/>
      <stop offset="1" stop-color="#9F9F9F"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="200" cy="120" r="2" fill="#D4AF37"/>
    <circle cx="1000" cy="80" r="2" fill="#B9F2FF"/>
    <circle cx="950" cy="520" r="3" fill="#D4AF37"/>
    <circle cx="150" cy="500" r="2" fill="#E5E4E2"/>
    <circle cx="600" cy="90" r="1.5" fill="#7FDBFF"/>
    <circle cx="300" cy="300" r="1.5" fill="#D4AF37"/>
  </g>
  <text x="50%" y="48%" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="200" fill="url(#gold)" stroke="#8D7220" stroke-width="2" filter="url(#glow)" letter-spacing="6">TMACK48</text>
  <text x="50%" y="62%" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="28" fill="url(#plat)" letter-spacing="14">OFFICIAL ARTIST UNIVERSE</text>
  <text x="50%" y="80%" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="22" fill="#7FDBFF" letter-spacing="6">MUSIC · VIDEOS · MOMENTS</text>
